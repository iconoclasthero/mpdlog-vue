<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mpd played</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="314x314" href="/webapp-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    /* Dark theme colors only */
    :root {
      --bg-color:          #1e2122;      
      --text-color:        #e0e0e0;      
      --pre-bg-color:      #1e1e1e;      
      --pre-text-color:    #e0e0e0;      
      --timestamp-color:   #80cbc4;      
      --song-color:        #cfcd15;      
      --artist-color:      #ff1900;      
      --green-color:       #3ea3a3;      
      --playing-color:     #00A000;      
/*    --album-color:       #e4dbd3; */
      --album-color:       #eece91;
      --button-bg-color:   #333;         
      --button-text-color: #fff;         
    }
    
    body { 
      font-family: Arial, sans-serif; 
      background-color: #1e2122; 
      color: /* 40%: #81251d; /* 50% */ #561913; /* #40130e; /* #531a1a; /* #400000; /* #333; */
      padding: 20px; 
    }
    
    h1 { color: #444; }
    
    pre { 
      background-color: #383838;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      line-height: 1.5;
    }
    
    h2, h3 { margin: 0; padding: 0; }
    
    * { 
      text-decoration-color: #1e2122;
      text-decoration-thickness: 3.5px; 
    }
    
    .timestamp { color: #80cbc4; }
/*  .time { color: #007bff; } */
    .time { color: #c9d2d1; }
    .song { color: #facc15; }
/*    .song { color: #fbe1a4; } 
    .song { color: #ff9c23; }
    .song { color: #eece91; } 
    .song { color: #f9d972; }
    .song { color: #fbe27d; } */
    .artist { color: #d73e30; }
    .path { color: #5e5b55; }
/*  .album { color: #6c757d; } 
    .album { color: #eece91; } */
    .album { color: #ff9c23; } 
    .bullet-1 { color: #76726a; }
    .pl-head { color: #cbc4b7; }
    
    .pauseicon { 
      font-style: normal;
      color: #d94031;
      letter-spacing: -0.05em;
    }
    
    @media (max-width: 768px) {
      .pauseicon {
        visibility: hidden;
        position: absolute;
      }
      .pauseicon::after {
        content: "⏯";
        visibility: visible;
        position: absolute;
        left: 0; 
      }
    }
    
    .smallemoji {
      font-size: 0.7em;
      line-height: 1;
      vertical-align: middle;
    }
    
    @media (max-width: 768px) {
      .smallemoji {
        font-size: 0.6em;
        line-height: 1;
        vertical-align: middle;
      }
    }
    
    .skipend { 
      line-height: 1.2em;
      position: absolute;
      color: #007bff;
      font-style: normal; 
    }
    
    @media (max-width: 768px) {
      .skipend { 
        visibility: hidden;
        font-style: normal;
        font-size: 1.2em;
        color: #007bff;
        position: relative; 
      }
      .skipend::after { 
        content: "⏭";
        visibility: visible;
        position: absolute;
        left: 0; 
      }
    }
    
    .desktop { display: inline; }
    .mobile { display: none; }
    
    @media (max-width: 768px) {
      .desktop { display: none; }
      .mobile { display: inline; }
      .smallemoji {
        font-size: 0.7em;
        line-height: 1;
        vertical-align: middle; 
      }
    }
    
    .notes { 
      letter-spacing: -0.15em;
      font-kerning: none;
    }
    
    .playing { color: #00A000; }
    .album { color: #e4dbd3; } 
    .album { color: #ff9c23; }
    .album { color: #f9d972; }
    .album { color: #eece91; } 
    .album { color: #f5e2bd; }
    .album { color: #f8ebd3; }
/*    .album { color: #f1b66e; } */
/*    .album { color: #2596be; } */

    .song a, .album a, .artist a { 
      color: inherit; 
      font-style: italic; 
    }
    
    .hidden-link {
      text-decoration: none;
      color: inherit;
    }
    
    .watermark { 
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.1;
      pointer-events: none;
    }
    
    .tab-stops {
      tab-size: 8;
      -moz-tab-size: 8;
      -o-tab-size: 8;
    }
    
    button.icon svg { 
      width: 33px;
      height: 33px;
/*      fill: #0dcaf0; */
      fill: #007bff;
/*      background-color: #0dcaf0; */
      background-color: #007bff; 
    }
    
    .pre-alternate:nth-child(odd) { color: #ff0000; }
    .button-container { display: flex; flex-direction: column; gap: 10px; }
    .button-row { display: flex; gap: 10px; }
    .extlink { font-size: 0.6em; vertical-align: super; }

    .hover-tooltip {
      position: relative;
    }

    .hover-tooltip .tooltip-text {
      visibility: hidden;
      position: absolute;
      background: #222;
      color: #fff;
      padding: 3px 6px;
      border-radius: 4px;
      top: 120%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .hover-tooltip:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
    }

    .file-path {
      font-size: 1em;
      color: #8f7c57;       /* change this to whatever */
      color: #bea574;
      color: #d6b983;       /* 10% */
      color: #eece91;       /*  0% */
      opacity: 0.75;
      word-break: break-all;
    }

    .short-br {
      display: block;
      height: 1px;
      margin: 0;
      padding: 0;
    }
    .medium-br {
      display: block;
      height: 0.5em;
      margin: 0;
      padding: 0;
    }


  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
